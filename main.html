<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>黄啸宇 & 康越 · 婚礼邀请</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@100;300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ─── CSS Variables ─── */
    :root {
      --felt-cream:  #F5EFE4;
      --felt-warm:   #E8D5B7;
      --felt-blush:  #E8C4B0;
      --felt-rust:   #C4855A;
      --felt-brown:  #7A4E2D;
      --felt-dark:   #2D1B0E;
      --felt-green:  #8BAF7C;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--felt-dark);
      font-family: 'Georgia', 'STSong', 'Songti SC', serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    /* ─── Root ─── */
    #app {
      position: fixed; inset: 0;
      overflow: hidden;
    }

    /* ════════════════════════════════
       FELT BACKGROUND LAYER
    ════════════════════════════════ */
    #bg-layer {
      position: absolute; inset: 0; z-index: 0;
      /* fabric weave texture */
      background-color: var(--felt-dark);
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.014) 0px,
          rgba(255,255,255,0.014) 1px,
          transparent 1px,
          transparent 5px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.014) 0px,
          rgba(255,255,255,0.014) 1px,
          transparent 1px,
          transparent 5px
        ),
        repeating-linear-gradient(
          45deg,
          rgba(196,133,90,0.03) 0px,
          rgba(196,133,90,0.03) 1px,
          transparent 1px,
          transparent 12px
        );
    }

    /* warm dual-glow */
    #bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 28% 38%, rgba(196,133,90,0.18) 0%, transparent 58%),
        radial-gradient(ellipse at 72% 72%, rgba(139,175,124,0.10) 0%, transparent 52%);
      pointer-events: none;
    }

    /* ════════════════════════════════
       LOADER
    ════════════════════════════════ */
    #loader {
      position: absolute; inset: 0; z-index: 100;
      background: var(--felt-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }

    .loader-gif {
      width: 72px; height: 72px;
      object-fit: contain;
    }

    .loader-track {
      width: 160px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--felt-blush), var(--felt-rust));
      border-radius: 99px;
      transition: width 0.25s ease;
    }
    .loader-pct {
      font-size: 12px;
      color: rgba(245,239,228,0.5);
      letter-spacing: 0.3em;
    }

    /* ════════════════════════════════
       START OVERLAY
    ════════════════════════════════ */
    #start-overlay {
      position: absolute; inset: 0; z-index: 30;
      display: none; /* shown after loader */
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding-top:    calc(var(--safe-top)    + 20px);
      padding-bottom: calc(var(--safe-bottom) + 36px);
      padding-left: 24px; padding-right: 24px;
      opacity: 0; /* fades in via GSAP */
    }

    /* Felt-texture backdrop */
    #start-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 28% 38%, rgba(196,133,90,0.16) 0%, transparent 58%),
        radial-gradient(ellipse at 72% 72%, rgba(139,175,124,0.10) 0%, transparent 52%),
        rgba(28,14,6,0.68);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .overlay-top-bar {
      position: relative; z-index: 1;
      width: 100%; height: 0;
    }

    .overlay-center {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      flex: 1;
      justify-content: center;
    }

    .start-subtitle {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 100;
      font-size: clamp(11px, 3.2vw, 13px);
      color: rgba(232,213,183,0.6);
      letter-spacing: 0.7em;
      text-indent: 0.7em;
      margin-bottom: 18px;
    }

    .start-main-title {
      font-family: 'Ma Shan Zheng', 'Dancing Script', cursive;
      font-size: clamp(34px, 10vw, 48px);
      color: var(--felt-cream);
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.18em;
      text-shadow:
        1px 1px 0   rgba(122, 78, 45, 0.70),
        2px 2px 0   rgba(122, 78, 45, 0.45),
        3px 3px 0   rgba(122, 78, 45, 0.22),
        0   6px 18px rgba(45,  27, 14, 0.55);
    }

    .start-heart {
      position: relative; z-index: 1;
      margin: 16px 0 14px;
      line-height: 1;
      font-size: 20px;
      color: var(--felt-rust);
      filter: drop-shadow(0 1px 3px rgba(122,78,45,0.5));
      animation: heart-pulse 2.4s ease-in-out infinite;
    }
    @keyframes heart-pulse {
      0%, 100% { transform: scale(1);    }
      45%       { transform: scale(1.18); }
      55%       { transform: scale(1.14); }
    }

    .start-date {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      font-size: clamp(12px, 3.5vw, 14px);
      color: rgba(232,196,176,0.65);
      letter-spacing: 0.55em;
      text-indent: 0.55em;
    }

    .overlay-bottom {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      width: 100%;
    }

    /* Felt card button */
    #btn-start {
      position: relative;
      width: clamp(180px, 60vw, 240px);
      padding: 16px 0;
      background: linear-gradient(160deg, #8B5E32 0%, #6B4220 100%);
      border: none; outline: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow:
        0 1px 0   rgba(255,255,255,0.12) inset,
        0 -2px 0  rgba(0,0,0,0.25) inset,
        0 8px 28px rgba(45,27,14,0.55),
        0 2px 6px  rgba(45,27,14,0.35);
      animation: btn-idle 4s ease-in-out infinite;
      overflow: hidden;
    }
    #btn-start::before {
      content: '';
      position: absolute; inset: 6px;
      border-radius: 9px;
      border: 1.5px dashed rgba(255,255,255,0.28);
      pointer-events: none;
    }
    #btn-start::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 55%);
      pointer-events: none;
    }
    #btn-text {
      position: relative; z-index: 1;
      display: block;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: clamp(15px, 4.5vw, 17px);
      color: #1B2A4A;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.18);
      white-space: nowrap;
    }

    @keyframes btn-idle {
      0%, 100% { transform: rotate(-0.4deg) scale(1);    }
      40%       { transform: rotate( 0.5deg) scale(1.015); }
      75%       { transform: rotate(-0.2deg) scale(0.995); }
    }
    #btn-start:active {
      animation: none;
      transform: scale(0.94) rotate(0deg);
      transition: transform 0.08s;
    }

    .start-footnote {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      font-size: 11px;
      color: #5C5047;
      letter-spacing: 0.22em;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ FELT BACKGROUND ══ -->
  <div id="bg-layer"></div>

  <!-- ══ START OVERLAY ══ -->
  <div id="start-overlay">
    <div class="overlay-top-bar" aria-hidden="true"></div>

    <div class="overlay-center">
      <p class="start-subtitle">诚邀您出席</p>
      <h3 class="start-main-title">黄啸宇 &amp; 康越</h3>
      <div class="start-heart" aria-hidden="true">♥</div>
      <p class="start-date">2026.05.01</p>
    </div>

    <div class="overlay-bottom">
      <button id="btn-start" aria-label="开启邀请">
        <span id="btn-text"></span>
      </button>
      <p class="start-footnote">请在能播放声音的地方打开</p>
    </div>
  </div>

  <!-- ══ LOADER ══ -->
  <div id="loader">
    <img class="loader-gif" id="loader-gif"
         src="./assets/placeholder.gif"
         alt="" />
    <div class="loader-track">
      <div class="loader-fill" id="loader-fill"></div>
    </div>
    <p class="loader-pct" id="loader-pct">0%</p>
  </div>

</div>

<!-- BGM — hidden, played on button click -->
<audio id="bgm" loop preload="auto">
  <source src="./assets/bgm.wav" type="audio/wav" />
  <source src="./assets/bgm.wav" type="audio/wave" />
</audio>

<script>
/* ══════════════════════════════════════════
   ASSET PRELOADER
   Tracks 6 assets; each = 1/6 of progress.
══════════════════════════════════════════ */
const ASSETS = [
  { type: 'image', src: './assets/placeholder.gif'          },
  { type: 'image', src: './assets/headshot3.jpg'            },
  { type: 'audio', src: './assets/bgm.wav'                  },
  { type: 'video', src: './assets/header_banner_video_ver2.mp4' },
  { type: 'video', src: './assets/ending-video-ver2.mp4'    },
  { type: 'video', src: './assets/ending-video-ver2.mp4'         },
];

const $loaderFill = document.getElementById('loader-fill');
const $loaderPct  = document.getElementById('loader-pct');
const $loader     = document.getElementById('loader');
const $overlay    = document.getElementById('start-overlay');
const $btnStart   = document.getElementById('btn-start');
const $bgm        = document.getElementById('bgm');

let loadedCount = 0;
const total = ASSETS.length;

function onAssetReady() {
  loadedCount++;
  const pct = Math.round((loadedCount / total) * 100);
  $loaderFill.style.width = pct + '%';
  $loaderPct.textContent  = pct + '%';

  if (loadedCount >= total) {
    allAssetsReady();
  }
}

function preloadAsset(asset) {
  // Timeout fallback so a slow/failed asset never blocks the UI
  const timeout = setTimeout(onAssetReady, asset.type === 'video' ? 8000 : 5000);
  const done = () => { clearTimeout(timeout); onAssetReady(); };

  if (asset.type === 'image') {
    const img = new Image();
    img.onload  = done;
    img.onerror = done;
    img.src = asset.src;

  } else if (asset.type === 'audio') {
    const aud = new Audio();
    aud.preload = 'auto';
    aud.oncanplaythrough = done;
    aud.onerror          = done;
    aud.src = asset.src;
    aud.load();

  } else if (asset.type === 'video') {
    const vid = document.createElement('video');
    vid.preload  = 'metadata';   // just metadata; full data streams when played
    vid.muted    = true;
    vid.onloadedmetadata = done;
    vid.onerror          = done;
    vid.src = asset.src;
    vid.load();
  }
}

// Kick off all preloads in parallel
ASSETS.forEach(preloadAsset);

/* ══════════════════════════════════════════
   WHEN ALL ASSETS ARE READY
══════════════════════════════════════════ */
function allAssetsReady() {
  // GIF bounce → loader exit → reveal overlay
  gsap.timeline()
    .to('#loader-gif', { y: -10, duration: 0.18, ease: 'power2.out' })
    .to('#loader-gif', { y: 0,   duration: 0.22, ease: 'bounce.out' })
    .to($loader, {
      opacity: 0, duration: 0.45, ease: 'power2.in',
      delay: 0.25,
      onComplete: () => {
        $loader.style.display = 'none';
        $overlay.style.display = 'flex';
        gsap.to($overlay, { opacity: 1, duration: 0.5, ease: 'power2.out',
          onComplete: startTypewriter,
        });
      },
    });
}

/* ══════════════════════════════════════════
   TYPEWRITER
══════════════════════════════════════════ */
const BTN_LABEL = '开启邀请';
const BTN_DELAY = 120;

function startTypewriter() {
  const $t = document.getElementById('btn-text');
  let i = 0;
  $t.textContent = '';
  (function tick() {
    if (i < BTN_LABEL.length) {
      $t.textContent += BTN_LABEL[i++];
      setTimeout(tick, BTN_DELAY);
    }
  })();
}

/* ══════════════════════════════════════════
   WECHAT AUTOPLAY UNLOCK
══════════════════════════════════════════ */
function wxUnlock() {
  $bgm.load();
}
if (typeof WeixinJSBridge === 'undefined') {
  document.addEventListener('WeixinJSBridgeReady', wxUnlock, { once: true });
} else {
  wxUnlock();
}

/* ══════════════════════════════════════════
   START BUTTON
══════════════════════════════════════════ */
let started = false;

$btnStart.addEventListener('click', handleStart, { once: true });
$btnStart.addEventListener('touchend', function onTouch(e) {
  e.preventDefault();
  $btnStart.removeEventListener('touchend', onTouch);
  handleStart();
}, { passive: false });

function handleStart() {
  if (started) return;
  started = true;

  // Felt button collapse
  gsap.to($btnStart, { scale: 0.88, opacity: 0, duration: 0.25, ease: 'power2.in' });

  // Fade out overlay
  gsap.to($overlay, {
    opacity: 0, duration: 0.55, delay: 0.15, ease: 'power2.inOut',
  });

  // Start BGM
  $bgm.volume = 0;
  const bgmPlay = $bgm.play();
  if (bgmPlay !== undefined) {
    bgmPlay
      .then(() => {
        gsap.to($bgm, { volume: 0.75, duration: 1.5, ease: 'power2.out' });
      })
      .catch(() => {
        // Autoplay blocked — music will resume when index.html loads
      });
  }

  // Mark BGM as active in session so all subsequent pages resume it
  sessionStorage.setItem('bgmPlaying', '1');
  sessionStorage.setItem('bgmTime', '0');

  // Navigate to video intro after brief fade
  setTimeout(() => {
    window.location.href = './index.html';
  }, 550);
}
</script>
</body>
</html>
