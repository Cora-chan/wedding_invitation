<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>黄啸宇 & 康越 · 婚礼地点</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@100;300;400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    :root {
      --champagne: #F5E6CA;
      --ivory:     #FFF8F0;
      --gold:      #C9A96E;
      --gold-l:    #E8D5A3;
      --gold-d:    #9E7A3F;
      --bg-deep:   #1A0C06;
      --bg-mid:    #2C1810;
      --bg-warm:   #3D1F0D;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      background: var(--bg-deep);
      font-family: 'Noto Sans SC', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    /* ── Nav pills (identical to invitation.html) ── */
    .page-nav-btn {
      position: fixed; left: 50%; transform: translateX(-50%);
      z-index: 80; cursor: pointer; border: none; background: none;
      padding: 8px 16px; -webkit-tap-highlight-color: transparent;
    }
    .page-nav-btn__pill {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 99px;
      background: rgba(26,12,6,0.82);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px dashed rgba(201,169,110,0.38);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 1px 0 rgba(201,169,110,0.08) inset;
      color: var(--gold-l); font-family: inherit;
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.3em; text-indent: 0.3em; white-space: nowrap;
      transition: transform 0.15s;
    }
    .page-nav-btn:active .page-nav-btn__pill { transform: scale(0.93); }
    #page-nav-up   { top: calc(var(--safe-top) + 10px); animation: bob-up   2.2s ease-in-out infinite; }
    #page-nav-down { bottom: calc(var(--safe-bottom) + 10px); animation: bob-down 2.2s ease-in-out infinite; }
    @keyframes bob-up   { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
    @keyframes bob-down { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(5px)} }

    /* ── Page wrapper + same fabric texture ── */
    #map-page {
      min-height: 100svh; position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
      padding-top:    calc(var(--safe-top)    + 64px);
      padding-bottom: calc(var(--safe-bottom) + 80px);
      padding-left: 20px; padding-right: 20px;
      background-color: var(--bg-mid);
      background-image:
        repeating-linear-gradient(0deg,  rgba(255,255,255,0.018) 0px,rgba(255,255,255,0.018) 1px,transparent 1px,transparent 5px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0px,rgba(255,255,255,0.018) 1px,transparent 1px,transparent 5px),
        repeating-linear-gradient(45deg, rgba(196,133,90,0.025)  0px,rgba(196,133,90,0.025)  1px,transparent 1px,transparent 12px),
        linear-gradient(170deg, var(--bg-deep) 0%, var(--bg-warm) 55%, var(--bg-deep) 100%);
    }
    #map-page::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 25% 30%, rgba(196,133,90,0.12) 0%, transparent 52%),
        radial-gradient(ellipse at 75% 75%, rgba(201,169,110,0.08) 0%, transparent 48%);
    }

    /* ── Section header ── */
    .section-label {
      font-size: 9px; font-weight: 100; letter-spacing: 0.6em; text-indent: 0.6em;
      color: var(--gold); text-transform: uppercase; text-align: center; margin-bottom: 10px;
    }
    .section-heading {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: clamp(30px, 9vw, 42px); text-align: center; color: var(--champagne);
      letter-spacing: 0.12em;
      text-shadow: 1px 1px 0 rgba(158,122,63,0.55), 2px 2px 0 rgba(158,122,63,0.28), 0 4px 18px rgba(0,0,0,0.5);
      margin-bottom: 18px;
    }
    .ornament-line {
      display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 28px;
    }
    .ornament-line::before { content:''; width:44px; height:1px; background:linear-gradient(90deg,transparent,var(--gold)); opacity:0.4; }
    .ornament-line::after  { content:''; width:44px; height:1px; background:linear-gradient(90deg,var(--gold),transparent); opacity:0.4; }
    .ornament-line span { font-size:14px; color:var(--gold); opacity:0.65; }

    /* ── Venue info strip ── */
    .venue-strip {
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(145deg, rgba(74,38,18,0.75), rgba(55,25,10,0.85));
      border: 2px dashed rgba(245,230,202,0.25);
      border-radius: 14px 4px 16px 4px / 4px 16px 4px 14px;
      padding: 14px 16px; margin-bottom: 16px;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.38));
      position: relative;
    }
    .venue-strip::before {
      content:''; position:absolute; top:-1px; left:14px; right:14px; height:1px;
      background:linear-gradient(90deg,transparent,rgba(245,230,202,0.2),transparent);
    }
    .venue-strip__icon { font-size: 22px; flex-shrink: 0; }
    .venue-strip__text { flex: 1; min-width: 0; }
    .venue-strip__name {
      font-size: clamp(14px,4.2vw,16px); font-weight: 600;
      color: var(--ivory); letter-spacing: 0.04em; margin-bottom: 2px;
    }
    .venue-strip__addr {
      font-size: 12px; font-weight: 300;
      color: rgba(245,230,202,0.45); letter-spacing: 0.05em;
    }

    /* ── Map preview ── */
    .map-preview {
      width: 100%; border-radius: 16px 4px 18px 4px / 4px 18px 4px 16px;
      overflow: hidden;
      border: 2px dashed rgba(245,230,202,0.22);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      margin-bottom: 14px;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.4));
      position: relative;
    }

    /* Static map image — shown when available */
    .map-preview img {
      width: 100%; display: block;
      aspect-ratio: 4 / 3; object-fit: cover;
    }

    /* Fallback grid placeholder */
    .map-placeholder {
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, #221508 0%, #160E05 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; position: relative;
    }
    .map-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,169,110,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,169,110,0.07) 1px, transparent 1px);
      background-size: 26px 26px;
    }
    /* Road lines to make it look more like a map */
    .map-road-h {
      position: absolute; left: 0; right: 0;
      height: 3px; background: rgba(201,169,110,0.14);
    }
    .map-road-v {
      position: absolute; top: 0; bottom: 0;
      width: 3px; background: rgba(201,169,110,0.14);
    }
    .map-pin-wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .map-pin-emoji {
      font-size: 32px;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.6));
      animation: pin-bounce 2s ease-in-out infinite;
    }
    @keyframes pin-bounce {
      0%,100%{ transform: translateY(0);     }
      45%    { transform: translateY(-6px);  }
      65%    { transform: translateY(-3px);  }
    }
    .map-pin-label {
      font-size: clamp(13px,4vw,15px); font-weight: 600;
      color: var(--champagne); letter-spacing: 0.06em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    .map-pin-addr {
      font-size: 11px; font-weight: 300;
      color: rgba(245,230,202,0.5); letter-spacing: 0.04em;
    }

    /* overlay gradient at bottom of map */
    .map-preview::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, rgba(22,14,5,0.55));
      pointer-events: none;
    }

    /* ── Map CTA buttons ── */
    .map-btns { display: flex; flex-direction: column; gap: 10px; }

    .btn-map-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
      color: var(--bg-deep); border: none;
      border-radius: 14px 4px 16px 4px / 4px 16px 4px 14px;
      font-family: inherit; font-size: clamp(13px,4vw,15px);
      font-weight: 600; letter-spacing: 0.22em;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(158,122,63,0.42), 0 1px 0 rgba(255,255,255,0.22) inset;
      filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.3));
      position: relative; overflow: hidden; transition: transform 0.15s;
    }
    .btn-map-primary::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(rgba(255,255,255,0.10), transparent); pointer-events: none;
    }
    .btn-map-primary:active { transform: scale(0.97); }

    .btn-map-secondary {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 13px;
      background: rgba(201,169,110,0.08);
      border: 2px dashed rgba(201,169,110,0.3);
      border-radius: 12px 4px 14px 4px / 4px 14px 4px 12px;
      font-family: inherit; font-size: clamp(12px,3.5vw,13px);
      font-weight: 300; letter-spacing: 0.2em; color: var(--gold-l);
      cursor: pointer; transition: background 0.15s, transform 0.15s;
    }
    .btn-map-secondary:active { transform: scale(0.97); background: rgba(201,169,110,0.14); }

    .map-support {
      text-align: center; font-size: 10px; font-weight: 100;
      color: rgba(201,169,110,0.3); letter-spacing: 0.3em; margin-top: 10px;
    }

    /* ── Fade-up ── */
    .fade-up { opacity:0; transform:translateY(28px); transition:opacity 0.65s ease,transform 0.65s ease; }
    .fade-up.visible { opacity:1; transform:translateY(0); }
    .fade-up:nth-child(1){transition-delay:0.00s} .fade-up:nth-child(2){transition-delay:0.07s}
    .fade-up:nth-child(3){transition-delay:0.13s} .fade-up:nth-child(4){transition-delay:0.18s}
    .fade-up:nth-child(5){transition-delay:0.23s} .fade-up:nth-child(6){transition-delay:0.28s}
  </style>
</head>
<body>

<button id="page-nav-up" class="page-nav-btn" onclick="goBack()">
  <div class="page-nav-btn__pill">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 8L6 4L10 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回详情
  </div>
</button>

<button id="page-nav-down" class="page-nav-btn" onclick="goNext()">
  <div class="page-nav-btn__pill">
    继续
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
</button>

<div id="map-page">

  <p class="section-label fade-up">Location</p>
  <h2 class="section-heading fade-up">婚礼地点</h2>
  <div class="ornament-line fade-up"><span>📍</span></div>

  <!-- Venue info strip -->
  <div class="venue-strip fade-up">
    <div class="venue-strip__icon">🏨</div>
    <div class="venue-strip__text">
      <p class="venue-strip__name">北京香格里拉饭店</p>
      <p class="venue-strip__addr">海淀区中关村南大街33号 · 二层金色大厅</p>
    </div>
  </div>

  <!-- Map preview -->
  <div class="map-preview fade-up">
    <!--
      ★ 有真实截图时，替换整个 .map-placeholder 为:
         <img src="./assets/map-preview.jpg" alt="婚礼地点地图" />
    -->
    <div class="map-placeholder">
      <div class="map-grid"></div>
      <!-- Decorative road lines -->
      <div class="map-road-h" style="top:38%"></div>
      <div class="map-road-h" style="top:62%"></div>
      <div class="map-road-v" style="left:35%"></div>
      <div class="map-road-v" style="left:65%"></div>
      <div class="map-pin-wrap">
        <div class="map-pin-emoji">📍</div>
        <p class="map-pin-label">北京香格里拉饭店</p>
        <p class="map-pin-addr">中关村南大街33号</p>
      </div>
    </div>
  </div>

  <!-- CTA buttons -->
  <div class="map-btns fade-up">
    <button class="btn-map-primary" onclick="openAmap()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5C5.51 1.5 3.5 3.51 3.5 6C3.5 9.5 8 14.5 8 14.5C8 14.5 12.5 9.5 12.5 6C12.5 3.51 10.49 1.5 8 1.5ZM8 7.5C7.17 7.5 6.5 6.83 6.5 6C6.5 5.17 7.17 4.5 8 4.5C8.83 4.5 9.5 5.17 9.5 6C9.5 6.83 8.83 7.5 8 7.5Z" fill="currentColor"/>
      </svg>
      高德地图导航
    </button>

    <button class="btn-map-secondary" onclick="openTencentMap()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5C5.51 1.5 3.5 3.51 3.5 6C3.5 9.5 8 14.5 8 14.5C8 14.5 12.5 9.5 12.5 6C12.5 3.51 10.49 1.5 8 1.5ZM8 7.5C7.17 7.5 6.5 6.83 6.5 6C6.5 5.17 7.17 4.5 8 4.5C8.83 4.5 9.5 5.17 9.5 6C9.5 6.83 8.83 7.5 8 7.5Z" stroke="currentColor" stroke-width="0.5" fill="none"/>
        <path d="M4 13l8-8M10 5h2v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      腾讯地图导航
    </button>
  </div>

  <p class="map-support fade-up">点击按钮将自动唤起地图应用</p>

</div>

<script>
/* ── IntersectionObserver ── */
(function(){
  if(!('IntersectionObserver' in window)){
    document.querySelectorAll('.fade-up').forEach(el=>el.classList.add('visible')); return;
  }
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);} });
  },{threshold:0.1,rootMargin:'0px 0px -28px 0px'});
  document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
})();

/* ── Map links ── */
const LNG = 116.321, LAT = 39.942;
const NAME = encodeURIComponent('北京香格里拉饭店');

function openAmap() {
  window.location.href =
    `https://uri.amap.com/marker?position=${LNG},${LAT}&name=${NAME}&src=wedding&coordinate=gaode&callnative=1`;
}

function openTencentMap() {
  window.location.href =
    `https://apis.map.qq.com/uri/v1/marker?marker=coord:${LAT},${LNG};title:北京香格里拉饭店;addr:海淀区中关村南大街33号&referer=wedding`;
}

/* ── Navigation ── */
let transitioning=false;
function goBack(){
  if(transitioning)return; transitioning=true;
  gsap.to(['#map-page','#page-nav-up','#page-nav-down'],{
    opacity:0,y:-24,duration:0.32,ease:'power2.in',
    onComplete:()=>{ window.location.href='./invitation.html'; }
  });
}
function goNext(){
  if(transitioning)return; transitioning=true;
  gsap.to(['#map-page','#page-nav-up','#page-nav-down'],{
    opacity:0,y:24,duration:0.32,ease:'power2.in',
    onComplete:()=>{ window.location.href='./ending.html'; }
  });
}

/* ── Swipe ── */
let vY=0,vX=0;
document.addEventListener('touchstart',e=>{vY=e.touches[0].clientY;vX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dy=vY-e.changedTouches[0].clientY, dx=Math.abs(vX-e.changedTouches[0].clientX);
  if(Math.abs(dy)<70||dx>Math.abs(dy)*0.65)return;
  dy>0?goNext():goBack();
},{passive:true});

/* ── Entrance ── */
window.addEventListener('DOMContentLoaded',()=>{
  gsap.from(['#page-nav-up','#page-nav-down'],{opacity:0,y:8,duration:0.5,ease:'power2.out',delay:0.4,stagger:0.12});
});
</script>
</body>
</html>
