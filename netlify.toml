[build]
  publish = "."

# ── 视频：必须返回 Accept-Ranges 才能支持断点续传和流式预加载 ──
[[headers]]
  for = "/assets/*.mp4"
  [headers.values]
    Content-Type    = "video/mp4"
    Accept-Ranges   = "bytes"
    Cache-Control   = "public, max-age=31536000, immutable"

# ── 音频 ──
[[headers]]
  for = "/assets/*.wav"
  [headers.values]
    Content-Type    = "audio/wav"
    Accept-Ranges   = "bytes"
    Cache-Control   = "public, max-age=31536000, immutable"

# ── 图片 ──
[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Content-Type    = "image/jpeg"
    Cache-Control   = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.gif"
  [headers.values]
    Content-Type    = "image/gif"
    Cache-Control   = "public, max-age=31536000, immutable"

# ── HTML：不缓存，保证更新即时生效 ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control   = "no-store"
    X-Frame-Options = "DENY"

# ── 全局安全头 ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
