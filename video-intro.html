<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>黄啸宇 & 康越 · 婚礼邀请</title>

  <!-- Google Fonts: handwriting + thin sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@100;300&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ─── CSS Variables ─── */
    :root {
      --felt-cream:   #F5EFE4;
      --felt-warm:    #E8D5B7;
      --felt-blush:   #E8C4B0;
      --felt-rust:    #C4855A;
      --felt-brown:   #7A4E2D;
      --felt-dark:    #2D1B0E;
      --felt-green:   #8BAF7C;
      --felt-muted:   rgba(245, 239, 228, 0.85);
      --safe-top:     env(safe-area-inset-top, 0px);
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
      --safe-left:    env(safe-area-inset-left, 0px);
      --safe-right:   env(safe-area-inset-right, 0px);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--felt-dark);
      font-family: 'Georgia', 'STSong', 'Songti SC', serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    /* ─── Root Page Stack ─── */
    #app {
      position: fixed; inset: 0;
      overflow: hidden;
    }

    /* ════════════════════════════════
       LOADER
    ════════════════════════════════ */
    #loader {
      position: absolute; inset: 0; z-index: 100;
      background: var(--felt-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }

    .loader-gif {
      width: 72px; height: 72px;
      object-fit: contain;
    }

    .loader-track {
      width: 160px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--felt-blush), var(--felt-rust));
      border-radius: 99px;
      transition: width 0.2s ease;
    }
    .loader-pct {
      font-size: 12px;
      color: rgba(245,239,228,0.5);
      letter-spacing: 0.3em;
    }

    /* ════════════════════════════════
       VIDEO LAYER
    ════════════════════════════════ */
    #video-layer {
      position: absolute; inset: 0; z-index: 1;
      background: var(--felt-dark);
      overflow: hidden;
    }

    #main-video {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      object-fit: cover;
    }

    /* Warm vignette overlay */
    #video-vignette {
      position: absolute; inset: 0; z-index: 2;
      background:
        radial-gradient(ellipse at center,
          transparent 40%,
          rgba(45,27,14,0.55) 100%);
      pointer-events: none;
    }

    /* ─── Video Progress Bar ─── */
    #video-progress {
      position: absolute;
      top: var(--safe-top); left: 0; right: 0;
      height: 2px; z-index: 20;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.4s;
    }
    #video-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg,
        rgba(232,196,176,0.9),
        rgba(196,133,90,0.9));
      border-radius: 0 1px 1px 0;
      transition: width 0.1s linear;
    }
    #video-progress.visible { opacity: 1; }

    /* ════════════════════════════════
       START OVERLAY — three-zone layout
    ════════════════════════════════ */
    #start-overlay {
      position: absolute; inset: 0; z-index: 30;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: space-between;
      /* safe-area top + bottom */
      padding-top:    calc(var(--safe-top) + 20px);
      padding-bottom: calc(var(--safe-bottom) + 36px);
      padding-left: 24px; padding-right: 24px;
    }

    /* Felt-texture backdrop */
    #start-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 28% 38%, rgba(196,133,90,0.16) 0%, transparent 58%),
        radial-gradient(ellipse at 72% 72%, rgba(139,175,124,0.10) 0%, transparent 52%),
        rgba(28,14,6,0.68);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    /* ── Top spacer (status-bar placeholder) ── */
    .overlay-top-bar {
      position: relative; z-index: 1;
      width: 100%;
      /* intentionally empty — safe-area padding on parent handles the inset */
      height: 0;
    }

    /* ── Center visual zone ── */
    .overlay-center {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      flex: 1;
      justify-content: center;
    }

    /* subtitle — 诚邀您出席 */
    .start-subtitle {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 100;
      font-size: clamp(11px, 3.2vw, 13px);
      color: rgba(232,213,183,0.6);
      letter-spacing: 0.7em;
      text-indent: 0.7em; /* optical balance for letter-spacing */
      margin-bottom: 18px;
    }

    /* main title — 黄啸宇 & 康越 */
    .start-main-title {
      font-family: 'Ma Shan Zheng', 'Dancing Script', cursive;
      font-size: clamp(34px, 10vw, 48px);
      color: var(--felt-cream);
      text-align: center;
      line-height: 1.2;
      /* extreme letter-spacing for cinematic feel */
      letter-spacing: 0.18em;
      /* multi-layer 3D shadow */
      text-shadow:
        1px 1px 0   rgba(122, 78, 45, 0.70),
        2px 2px 0   rgba(122, 78, 45, 0.45),
        3px 3px 0   rgba(122, 78, 45, 0.22),
        0   6px 18px rgba(45,  27, 14, 0.55);
    }

    /* felt heart */
    .start-heart {
      position: relative; z-index: 1;
      margin: 16px 0 14px;
      line-height: 1;
      font-size: 20px;
      /* hand-crafted SVG heart, felt-texture color */
      color: var(--felt-rust);
      filter: drop-shadow(0 1px 3px rgba(122,78,45,0.5));
      animation: heart-pulse 2.4s ease-in-out infinite;
    }
    @keyframes heart-pulse {
      0%, 100% { transform: scale(1);    }
      45%       { transform: scale(1.18); }
      55%       { transform: scale(1.14); }
    }

    /* date — 2026.05.01 */
    .start-date {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      font-size: clamp(12px, 3.5vw, 14px);
      color: rgba(232,196,176,0.65);
      letter-spacing: 0.55em;
      text-indent: 0.55em;
    }

    /* ── Bottom CTA zone ── */
    .overlay-bottom {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      width: 100%;
    }

    /* Felt card button with stitch border */
    #btn-start {
      position: relative;
      width: clamp(180px, 60vw, 240px);
      padding: 16px 0;
      /* wooden brown felt background */
      background: linear-gradient(160deg, #8B5E32 0%, #6B4220 100%);
      border: none; outline: none;
      border-radius: 14px;
      cursor: pointer;
      /* felt depth */
      box-shadow:
        0 1px 0   rgba(255,255,255,0.12) inset,
        0 -2px 0  rgba(0,0,0,0.25) inset,
        0 8px 28px rgba(45,27,14,0.55),
        0 2px 6px  rgba(45,27,14,0.35);
      animation: btn-idle 4s ease-in-out infinite;
      /* clip so inner stitch stays inside */
      overflow: hidden;
    }

    /* Stitch border via pseudo-element */
    #btn-start::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 9px;
      border: 1.5px dashed rgba(255,255,255,0.28);
      pointer-events: none;
    }

    /* Subtle top sheen (felt texture highlight) */
    #btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.10) 0%,
        transparent 55%);
      pointer-events: none;
    }

    /* Button text wrapper */
    #btn-text {
      position: relative; z-index: 1;
      display: block;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: clamp(15px, 4.5vw, 17px);
      /* dark navy blue — high contrast on brown felt */
      color: #1B2A4A;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.18);
      /* typewriter cursor placeholder */
      white-space: nowrap;
    }

    /* Blinking cursor after typewriter */
    #btn-text::after {
      content: '|';
      display: inline-block;
      color: rgba(27,42,74,0.6);
      animation: cursor-blink 0.85s step-end infinite;
      margin-left: 2px;
      opacity: 0; /* shown by JS after typing completes */
    }
    #btn-text.typing-done::after { opacity: 1; }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    @keyframes btn-idle {
      0%, 100% { transform: rotate(-0.4deg) scale(1);    }
      40%       { transform: rotate( 0.5deg) scale(1.015); }
      75%       { transform: rotate(-0.2deg) scale(0.995); }
    }
    #btn-start:active {
      animation: none;
      transform: scale(0.94) rotate(0deg);
      transition: transform 0.08s;
    }

    /* footnote tips — dark grey from the felt-doll lady */
    .start-footnote {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      font-size: 11px;
      color: #5C5047;   /* warm dark grey, sampled from felt figure */
      letter-spacing: 0.22em;
    }

    /* ════════════════════════════════
       SWIPE HINT (video end)
    ════════════════════════════════ */
    #swipe-hint {
      position: absolute; inset: 0; z-index: 25;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      pointer-events: none;
      opacity: 0;
    }

    .hint-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(245,239,228,0.12);
      border: 1.5px solid rgba(245,239,228,0.35);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    .hint-text {
      font-size: 13px;
      color: rgba(245,239,228,0.75);
      letter-spacing: 0.3em;
      text-align: center;
    }

    /* ════════════════════════════════
       NEXT PAGE PLACEHOLDER
    ════════════════════════════════ */
    #next-page {
      position: absolute; inset: 0; z-index: 0;
      background: var(--felt-cream);
      transform: translateY(100%);
      display: flex; align-items: center; justify-content: center;
    }
    .next-page-label {
      font-size: 14px;
      color: rgba(122,78,45,0.4);
      letter-spacing: 0.4em;
    }

    /* ════════════════════════════════
       SAFE-AREA PADDING HELPERS
    ════════════════════════════════ */
    .safe-top    { padding-top:    var(--safe-top);    }
    .safe-bottom { padding-bottom: var(--safe-bottom); }
  </style>
</head>
<body>

<div id="app">

  <!-- ══ NEXT PAGE PLACEHOLDER ══ -->
  <div id="next-page">
    <p class="next-page-label">· 邀请函内容页 ·</p>
  </div>

  <!-- ══ VIDEO LAYER ══ -->
  <div id="video-layer">
    <!--
      ★ 替换 src 为真实视频地址
      playsinline / webkit-playsinline 是微信/iOS 内联播放必需属性
    -->
    <video
      id="main-video"
      src="./assets/header_banner_video_ver2.mp4"
      playsinline
      webkit-playsinline
      x5-video-player-type="h5"
      x5-video-player-fullscreen="false"
      x5-video-orientation="portraint"
      preload="auto"
      muted
    ></video>

    <div id="video-vignette"></div>
    <div id="video-progress"><div id="video-progress-fill"></div></div>

    <!-- ══ SWIPE HINT ══ -->
    <div id="swipe-hint">
      <div class="hint-ring">
      </div>
      <p class="hint-text">滑动查看详情</p>
    </div>
  </div>

  <!-- ══ START OVERLAY ══ -->
  <div id="start-overlay">

    <!-- Status-bar safe-area anchor (empty, padding handled on parent) -->
    <div class="overlay-top-bar" aria-hidden="true"></div>

    <!-- ── Center Visual ── -->
    <div class="overlay-center">
      <p class="start-subtitle">诚邀您出席</p>

      <h3 class="start-main-title">黄啸宇 &amp; 康越</h3>

      <!-- Felt heart SVG — warmer than emoji, scales cleanly -->
     

      <p class="start-date" style="margin-top: 18px;">2026.05.01</p>
    </div>

    <!-- ── Bottom CTA ── -->
    <div class="overlay-bottom">
      <button id="btn-start" aria-label="开启邀请">
        <span id="btn-text"></span>
      </button>
      <p class="start-footnote">请在能播放声音的地方打开</p>
    </div>

  </div>

  <!-- ══ LOADER ══ -->
  <div id="loader">
    <!-- ★ 替换 src 为真实 GIF 路径，如 ./assets/loader.gif -->
    <img class="loader-gif" id="loader-gif"
         src="./assets/placeholder.gif"
         alt="" />
    <div class="loader-track">
      <div class="loader-fill" id="loader-fill"></div>
    </div>
    <p class="loader-pct" id="loader-pct">0%</p>
  </div>

</div><!-- /#app -->

<!--
  ★ 替换 src 为真实音乐地址
-->
<audio id="bgm" loop preload="auto">
  <source src="./assets/bgm.mp3" type="audio/mpeg" />
</audio>

<script>
/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const state = {
  loaded:        false,
  started:       false,
  videoEnded:    false,
  bgmUnlocked:   false,
  swipeReady:    false,
  transitioning: false,
};

/* ══════════════════════════════════════════
   ELEMENT REFS
══════════════════════════════════════════ */
const $loader        = document.getElementById('loader');
const $loaderFill    = document.getElementById('loader-fill');
const $loaderPct     = document.getElementById('loader-pct');
const $startOverlay  = document.getElementById('start-overlay');
const $btnStart      = document.getElementById('btn-start');
const $video         = document.getElementById('main-video');
const $progress      = document.getElementById('video-progress');
const $progressFill  = document.getElementById('video-progress-fill');
const $swipeHint     = document.getElementById('swipe-hint');
const $nextPage      = document.getElementById('next-page');
const $bgm           = document.getElementById('bgm');

/* ══════════════════════════════════════════
   1. LOADER — video canplaythrough
══════════════════════════════════════════ */
function setLoaderProgress(pct) {
  $loaderFill.style.width = pct + '%';
  $loaderPct.textContent  = Math.round(pct) + '%';
}

// Simulate incremental progress via buffered timeRanges
function updateBufferProgress() {
  if (state.loaded) return;
  if ($video.buffered.length > 0 && $video.duration > 0) {
    const buffered = $video.buffered.end($video.buffered.length - 1);
    const pct      = Math.min((buffered / $video.duration) * 100, 99);
    setLoaderProgress(pct);
  }
}

$video.addEventListener('progress', updateBufferProgress);
$video.addEventListener('canplaythrough', onVideoReady);

// Fallback: if canplaythrough never fires (e.g. WeChat cache), resolve after short delay
let loaderFallback = setTimeout(onVideoReady, 6000);

function onVideoReady() {
  if (state.loaded) return;
  state.loaded = true;
  clearTimeout(loaderFallback);
  setLoaderProgress(100);

  // GIF pop then loader exit → typewriter starts
  gsap.timeline()
    .to('#loader-gif', {
      y: -10, duration: 0.18, ease: 'power2.out',
    })
    .to('#loader-gif', {
      y: 0, duration: 0.22, ease: 'bounce.out',
    })
    .to($loader, {
      opacity: 0, duration: 0.45, ease: 'power2.in',
      delay: 0.25,
      onComplete: () => {
        $loader.style.display = 'none';
        startTypewriter();
      },
    });
}

/* ══════════════════════════════════════════
   1b. TYPEWRITER — button text reveal
══════════════════════════════════════════ */
const BTN_LABEL  = '开启邀请';
const BTN_DELAY  = 120; // ms per character

function startTypewriter() {
  const $t = document.getElementById('btn-text');
  let i = 0;
  $t.textContent = '';

  function tick() {
    if (i < BTN_LABEL.length) {
      $t.textContent += BTN_LABEL[i++];
      setTimeout(tick, BTN_DELAY);
    } else {
      // Typing done — show blinking cursor
      $t.classList.add('typing-done');
    }
  }
  // Slight delay so overlay fade-in finishes first
  setTimeout(tick, 200);
}

/* ══════════════════════════════════════════
   2. WECHAT AUTOPLAY HACK
   WeChat blocks audio/video play() until
   WeixinJSBridgeReady fires or user gesture.
══════════════════════════════════════════ */
function wxUnlock() {
  // Touch any media element to satisfy WeChat's policy
  $bgm.load();
  $video.load();
  state.bgmUnlocked = true;
}

if (typeof WeixinJSBridge === 'undefined') {
  document.addEventListener('WeixinJSBridgeReady', wxUnlock, { once: true });
} else {
  wxUnlock();
}

/* ══════════════════════════════════════════
   3. START BUTTON
══════════════════════════════════════════ */
$btnStart.addEventListener('click', handleStart, { once: true });
$btnStart.addEventListener('touchend', function onTouch(e) {
  e.preventDefault();
  $btnStart.removeEventListener('touchend', onTouch);
  handleStart();
}, { passive: false });

function handleStart() {
  if (state.started) return;
  state.started = true;

  // Felt-style button collapse
  gsap.to($btnStart, {
    scale: 0.88, opacity: 0, duration: 0.25, ease: 'power2.in',
  });

  // Fade out entire start overlay
  gsap.to($startOverlay, {
    opacity: 0, duration: 0.55, delay: 0.15, ease: 'power2.inOut',
    onComplete: () => {
      $startOverlay.style.display = 'none';
      // Show progress bar
      $progress.classList.add('visible');
    },
  });

  // Play video
  const videoPlay = $video.play();
  if (videoPlay !== undefined) {
    videoPlay.catch(() => {
      // Muted autoplay fallback — try again muted
      $video.muted = true;
      $video.play().catch(() => {});
    });
  }

  // Play BGM
  $bgm.volume = 0;
  const bgmPlay = $bgm.play();
  if (bgmPlay !== undefined) {
    bgmPlay
      .then(() => gsap.to($bgm, { volume: 0.75, duration: 1.5, ease: 'power2.out' }))
      .catch(() => {
        // WeChat may still block — retry on next touch
        document.addEventListener('touchstart', function retryBgm() {
          $bgm.play().then(() => {
            gsap.to($bgm, { volume: 0.75, duration: 1.5 });
          }).catch(() => {});
          document.removeEventListener('touchstart', retryBgm);
        }, { once: true, passive: true });
      });
  }
}

/* ══════════════════════════════════════════
   4. VIDEO PROGRESS BAR
══════════════════════════════════════════ */
$video.addEventListener('timeupdate', () => {
  if (!$video.duration) return;
  const pct = ($video.currentTime / $video.duration) * 100;
  $progressFill.style.width = pct + '%';
});

/* ══════════════════════════════════════════
   5. VIDEO END — freeze + swipe hint
══════════════════════════════════════════ */
$video.addEventListener('ended', onVideoEnded);

function onVideoEnded() {
  state.videoEnded  = true;
  state.swipeReady  = true;

  // Fade out progress bar
  gsap.to($progress, { opacity: 0, duration: 0.4 });

  // Fade in swipe hint
  gsap.to($swipeHint, {
    opacity: 1, duration: 0.6, ease: 'power2.out',
    onComplete: () => { $swipeHint.style.pointerEvents = 'auto'; },
  });

  // Bounce loop on chevron icon
  gsap.to('#hint-svg', {
    y: 7,
    duration: 0.7,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1,
  });

  // Pulse the ring
  gsap.to('.hint-ring', {
    scale: 1.08,
    duration: 0.9,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: -1,
  });
}

/* ══════════════════════════════════════════
   6. SWIPE-UP TRANSITION
══════════════════════════════════════════ */
let touchStartY = 0;
let touchStartX = 0;

document.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!state.swipeReady || state.transitioning) return;

  const deltaY = touchStartY - e.changedTouches[0].clientY;
  const deltaX = Math.abs(touchStartX - e.changedTouches[0].clientX);

  // Must be mostly vertical and sufficient distance
  if (deltaY > 60 && deltaX < 80) {
    triggerPageTransition();
  }
}, { passive: true });

// Also allow mouse wheel on desktop preview
document.addEventListener('wheel', (e) => {
  if (!state.swipeReady || state.transitioning) return;
  if (e.deltaY > 40) triggerPageTransition();
}, { passive: true });

function triggerPageTransition() {
  state.transitioning = true;

  // Reveal next page from below
  gsap.set($nextPage, { y: '100%' });

  const tl = gsap.timeline();

  // 1. Hint exit
  tl.to($swipeHint, { opacity: 0, duration: 0.25, ease: 'power2.in' })

  // 2. Video layer slides up & scales slightly
    .to('#video-layer', {
      y: '-8%',
      scale: 0.96,
      duration: 0.55,
      ease: 'power2.inOut',
    }, '<0.1')

  // 3. Next page slides up from bottom
    .to($nextPage, {
      y: '0%',
      duration: 0.55,
      ease: 'power2.inOut',
